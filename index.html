<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>BarrierLess</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1565C0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BarrierLess">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="apple-touch-icon" sizes="180x180" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
:root{
  --b50:#E3F2FD;--b100:#BBDEFB;--b200:#90CAF9;--b300:#64B5F6;--b400:#42A5F5;
  --b500:#2196F3;--b600:#1E88E5;--b700:#1565C0;--b800:#0D47A1;
  --w:#fff;--g50:#F8FAFC;--g100:#F1F5F9;--g200:#E2E8F0;--g300:#CBD5E1;
  --g400:#94A3B8;--g500:#64748B;--g600:#475569;--g700:#334155;--g800:#1E293B;
  --r:14px;--rs:10px;--rx:6px;
  --top:60px;--bot:68px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans','Noto Sans SC',sans-serif;background:var(--g50);color:var(--g800);min-height:100vh;-webkit-font-smoothing:antialiased}

/* NAV */
.topnav{position:fixed;top:0;left:0;right:0;height:var(--top);background:rgba(255,255,255,.95);border-bottom:1px solid var(--g200);display:flex;align-items:center;padding:0 16px;z-index:100;backdrop-filter:blur(16px)}
.logo{display:flex;align-items:center;gap:8px;font-weight:800;font-size:17px}
.logo svg{width:32px;height:32px}
.logo span{background:linear-gradient(135deg,var(--b700),var(--b500));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.topright{margin-left:auto;display:flex;gap:6px}
.iconbtn{width:36px;height:36px;border-radius:10px;border:none;background:var(--g100);color:var(--g500);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s}
.iconbtn:hover{background:var(--b50);color:var(--b600)}

.botnav{position:fixed;bottom:0;left:0;right:0;height:var(--bot);background:var(--w);border-top:1px solid var(--g200);display:flex;align-items:center;justify-content:space-around;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.navbtn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 20px;border:none;background:none;color:var(--g400);font-size:10px;font-weight:600;font-family:inherit;cursor:pointer;position:relative;transition:.2s}
.navbtn.on{color:var(--b600)}
.navbtn.on::after{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:20px;height:2.5px;background:var(--b600);border-radius:0 0 3px 3px}
.navbtn svg{width:22px;height:22px}
.badge{position:absolute;top:0;right:12px;background:#EF4444;color:#fff;font-size:8px;min-width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}

/* BANNER */
.apibanner{padding:8px 16px;background:#FEF9C3;border-bottom:1px solid #FDE68A;font-size:11px;color:#92400E;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.apibanner.ok{background:#D1FAE5;border-color:#6EE7B7;color:#065F46}
.apibanner button{padding:4px 10px;border-radius:6px;border:1px solid currentColor;background:#fff;color:inherit;font-size:10px;font-weight:700;cursor:pointer;font-family:inherit;margin-left:auto}

/* MAIN */
.main{padding-top:var(--top);padding-bottom:var(--bot);min-height:100vh}
.pg{display:none}.pg.on{display:block}

/* ====== CHAT ====== */
.chatbox{display:flex;flex-direction:column;height:calc(100vh - var(--top) - var(--bot))}
.chathead{padding:10px 16px;background:linear-gradient(135deg,var(--b700),var(--b500));color:#fff}
.chathead h2{font-size:13px;font-weight:600}
.chathead p{font-size:10px;opacity:.7;margin-top:1px}
.msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;scroll-behavior:smooth}
.m{max-width:88%;animation:fadeUp .25s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.m.u{align-self:flex-end}
.m.u .mb{background:linear-gradient(135deg,var(--b600),var(--b400));color:#fff;border-radius:var(--r) var(--r) 4px var(--r);padding:10px 14px;font-size:13.5px;line-height:1.5}
.m.a{align-self:flex-start}
.m.a .mb{background:var(--w);border:1px solid var(--g200);border-radius:var(--r) var(--r) var(--r) 4px;padding:14px;font-size:13.5px;line-height:1.6;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.ml{font-size:9px;font-weight:600;color:var(--g400);margin-bottom:3px;text-transform:uppercase;letter-spacing:.4px}
.m.u .ml{text-align:right}

.tblock{margin-top:10px;padding:12px;background:var(--b50);border-radius:var(--rs);border-left:3px solid var(--b500)}
.hz{font-family:'Noto Sans SC',sans-serif;font-size:24px;font-weight:700;color:var(--g800);letter-spacing:2px;line-height:1.5}
.py{font-size:13px;color:var(--b600);font-weight:500;margin-top:3px}
.en{font-size:12.5px;color:var(--g600);margin-top:3px}
.ba{font-size:12.5px;color:var(--g500);margin-top:2px;font-style:italic}
.ctip{margin-top:8px;padding:7px 10px;background:#fff;border-radius:6px;font-size:11.5px;color:var(--g600);border:1px solid var(--g200)}
.ctip b{color:var(--b700)}

/* Vocab table */
.vtbl{margin-top:10px;border-radius:var(--rs);overflow:hidden;border:1px solid var(--g200)}
.vtbl table{width:100%;border-collapse:collapse;font-size:11px}
.vtbl th{background:var(--b700);color:#fff;padding:6px 8px;text-align:left;font-weight:600;font-size:9px;text-transform:uppercase;letter-spacing:.4px}
.vtbl td{padding:6px 8px;border-bottom:1px solid var(--g100)}
.vtbl tr:last-child td{border:none}
.vtbl .hc{font-family:'Noto Sans SC';font-size:16px;font-weight:700;color:var(--g800)}
.vtbl .pc{color:var(--b600);font-weight:500}
.hsk{display:inline-block;padding:1px 5px;border-radius:3px;font-size:8px;font-weight:700;background:var(--b100);color:var(--b700)}

/* Input */
.cinput{padding:10px 14px;background:var(--w);border-top:1px solid var(--g200)}
.cirow{display:flex;gap:8px;align-items:flex-end}
.ci{flex:1;border:2px solid var(--g200);border-radius:22px;padding:10px 16px;font-size:13.5px;font-family:inherit;outline:none;resize:none;max-height:90px;line-height:1.4;transition:.2s}
.ci:focus{border-color:var(--b500)}
.ci::placeholder{color:var(--g400)}
.sendbtn{width:44px;height:44px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--b600),var(--b400));color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.2s}
.sendbtn:hover{transform:scale(1.05)}
.sendbtn:disabled{opacity:.4;transform:none;cursor:not-allowed}
.chips{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap}
.chip{font-size:9px;padding:3px 8px;border-radius:16px;background:var(--g100);color:var(--g500);font-weight:500}

/* Typing */
.dots{display:flex;gap:3px;padding:10px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--g400);animation:bounce 1.4s infinite ease-in-out}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-6px);opacity:1}}

/* Welcome */
.welcome{padding:24px;text-align:center}
.welcome .wicon{width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,var(--b500),var(--b300));margin:0 auto 12px;display:flex;align-items:center;justify-content:center}
.welcome h2{font-size:18px;font-weight:800;color:var(--g800)}
.welcome p{font-size:12px;color:var(--g500);margin-top:6px;line-height:1.5}
.qp{display:flex;flex-direction:column;gap:6px;margin-top:16px}
.qpb{padding:10px 14px;border-radius:var(--rs);border:1px solid var(--g200);background:#fff;cursor:pointer;text-align:left;font-family:inherit;font-size:12px;color:var(--g700);transition:.2s}
.qpb:hover{border-color:var(--b300);background:var(--b50)}

/* ====== VOCAB ====== */
.libhead{padding:16px;background:linear-gradient(135deg,var(--b800),var(--b600));color:#fff}
.libhead h1{font-size:20px;font-weight:800}
.lstats{display:flex;gap:14px;margin-top:10px}
.lst{background:rgba(255,255,255,.12);padding:8px 14px;border-radius:var(--rs)}
.lst .n{font-size:22px;font-weight:800}.lst .l{font-size:9px;opacity:.7;text-transform:uppercase}

.sbar{padding:10px 16px;background:var(--w)}
.swrap{display:flex;align-items:center;background:var(--g100);border-radius:10px;padding:0 12px;gap:6px}
.swrap svg{color:var(--g400);width:16px;height:16px;flex-shrink:0}
.sinp{flex:1;border:none;background:none;padding:10px 0;font-size:13px;font-family:inherit;outline:none}

.htabs{display:flex;gap:5px;padding:10px 16px;overflow-x:auto;background:var(--w);border-bottom:1px solid var(--g200)}
.htab{padding:6px 14px;border-radius:18px;border:1.5px solid var(--g200);background:#fff;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit;color:var(--g600);transition:.2s}
.htab.on{background:var(--b600);border-color:var(--b600);color:#fff}

.vlist{padding:10px 16px}
.vc{background:var(--w);border-radius:var(--r);padding:14px;margin-bottom:8px;border:1px solid var(--g200);display:flex;align-items:center;gap:12px;transition:.15s}
.vc:hover{border-color:var(--b300);box-shadow:0 2px 8px rgba(0,0,0,.06)}
.vhz{font-family:'Noto Sans SC';font-size:28px;font-weight:900;color:var(--g800);min-width:60px;text-align:center}
.vdet{flex:1;min-width:0}
.vpy{font-size:13px;color:var(--b600);font-weight:60
